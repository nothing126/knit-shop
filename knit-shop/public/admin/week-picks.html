<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin • Выбор недели</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo"></div>
          <b>Knit Admin</b>
        </div>
        <div class="nav">
          <a href="/admin/products.html">Товары</a>
          <a href="/admin/categories.html">Категории</a>
          <a class="active" href="/admin/week-picks.html">Выбор недели</a>
          <a id="out" href="#">Выйти</a>
        </div>
      </div>

      <div class="card">
        <h2 style="margin: 0 0 12px">Выбор недели</h2>

        <div class="grid">
          <div class="field">
            <label>Заголовок (базовый)</label>
            <input id="w_title" placeholder="Выбор недели" />
          </div>

          <div class="field">
            <label>Подзаголовок (базовый)</label>
            <input
              id="w_subtitle"
              placeholder="Например: Самые уютные вещи этой недели"
            />
          </div>

          <div class="field">
            <label>Заголовок RO</label>
            <input id="w_title_ro" placeholder="Alegerea săptămânii" />
          </div>

          <div class="field">
            <label>Заголовок RU</label>
            <input id="w_title_ru" placeholder="Выбор недели" />
          </div>

          <div class="field">
            <label>Заголовок EN</label>
            <input id="w_title_en" placeholder="Week picks" />
          </div>

          <div class="field">
            <label>Подзаголовок RO</label>
            <input id="w_subtitle_ro" placeholder="Opțional" />
          </div>

          <div class="field">
            <label>Подзаголовок RU</label>
            <input id="w_subtitle_ru" placeholder="Опционально" />
          </div>

          <div class="field">
            <label>Подзаголовок EN</label>
            <input id="w_subtitle_en" placeholder="Optional" />
          </div>

          <div class="field">
            <label>Начало недели</label>
            <input id="w_start" type="date" />
          </div>

          <div class="field">
            <label>Конец недели</label>
            <input id="w_end" type="date" />
          </div>

          <div class="field" style="grid-column: 1 / -1">
            <label>Товары (выбери несколько)</label>
            <select
              id="w_products"
              multiple
              size="10"
              style="width: 100%; padding: 10px; border-radius: 10px"
            ></select>
            <div class="hint">
              Зажми Ctrl (Windows) / Cmd (Mac), чтобы выбрать несколько.
            </div>
          </div>

          <div class="field">
            <label style="display: flex; gap: 10px; align-items: center">
              <input id="w_active" type="checkbox" />
              Активная неделя (покажется на главной)
            </label>
          </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 14px">
          <button id="save" class="btn">Сохранить</button>
          <button id="new" class="btn btn-ghost">Создать новую</button>
        </div>
      </div>

      <div class="card" style="margin-top: 14px">
        <h3 style="margin: 0 0 10px">История</h3>
        <div id="list"></div>
      </div>
    </div>

    <script type="module">
      import { api, mustAuth, logout, qs, escapeHtml } from "/admin/admin.js";

      await mustAuth();
      document.getElementById("out").onclick = (e) => {
        e.preventDefault();
        logout();
      };

      let currentId = null;
      let products = [];
      let picks = [];

      const el = (id) => qs(`#${id}`);
      const selProducts = el("w_products");
      const DEFAULT_TITLE = {
        ro: "Alegerea săptămânii",
        ru: "Выбор недели",
        en: "Week picks",
      };

      function option(p) {
        const o = document.createElement("option");
        o.value = String(p.id);
        o.textContent = `#${p.id} — ${p.title} (${p.price})`;
        return o;
      }

      function selectedIds() {
        return Array.from(selProducts.selectedOptions).map((o) =>
          Number(o.value),
        );
      }

      function setSelected(ids) {
        const set = new Set((ids || []).map(Number));
        Array.from(selProducts.options).forEach(
          (o) => (o.selected = set.has(Number(o.value))),
        );
      }

      function fillForm(pick) {
        currentId = pick?.id ?? null;
        el("w_title").value = pick?.title ?? DEFAULT_TITLE.ru;
        el("w_subtitle").value = pick?.subtitle ?? "";
        el("w_title_ro").value = pick?.title_ro ?? "";
        el("w_title_ru").value = pick?.title_ru ?? "";
        el("w_title_en").value = pick?.title_en ?? "";
        el("w_subtitle_ro").value = pick?.subtitle_ro ?? "";
        el("w_subtitle_ru").value = pick?.subtitle_ru ?? "";
        el("w_subtitle_en").value = pick?.subtitle_en ?? "";
        el("w_start").value = pick?.weekStart ?? "";
        el("w_end").value = pick?.weekEnd ?? "";
        el("w_active").checked = !!pick?.isActive;
        setSelected(pick?.productIds || []);
      }

      function renderList() {
        const box = el("list");
        box.innerHTML = "";

        if (!picks.length) {
          box.innerHTML = "<div class='muted'>Пока нет записей.</div>";
          return;
        }

        picks.forEach((p) => {
          const row = document.createElement("div");
          row.className = "row";
          row.style.display = "flex";
          row.style.justifyContent = "space-between";
          row.style.alignItems = "center";
          row.style.padding = "10px 0";
          row.style.borderBottom = "1px solid rgba(0,0,0,.06)";

          const left = document.createElement("div");
          const title = escapeHtml(p.title || "");
          const weekStart = escapeHtml(p.weekStart || "");
          const weekEnd = escapeHtml(p.weekEnd || "");
          const count = Number((p.productIds || []).length) || 0;
          left.innerHTML = `
      <b>${p.isActive ? "✅ " : ""}${title}</b>
      <div class="muted">${weekStart} → ${weekEnd} • товаров: ${count}</div>
    `;

          const right = document.createElement("div");
          right.style.display = "flex";
          right.style.gap = "8px";

          const btnEdit = document.createElement("button");
          btnEdit.className = "btn btn-ghost";
          btnEdit.textContent = "Редактировать";
          btnEdit.onclick = () => fillForm(p);

          const btnDel = document.createElement("button");
          btnDel.className = "btn btn-danger";
          btnDel.textContent = "Удалить";
          btnDel.onclick = async () => {
            if (!confirm("Удалить запись?")) return;
            await api(`/api/week-picks/${p.id}`, {
              method: "DELETE",
            });
            await loadAll();
            fillForm(picks[0] || null);
          };

          right.append(btnEdit, btnDel);
          row.append(left, right);
          box.append(row);
        });
      }

      async function loadAll() {
        const pr = await api("/api/products");
        products = pr || [];
        selProducts.innerHTML = "";
        products.forEach((p) => selProducts.append(option(p)));

        picks = await api("/api/week-picks");
        picks = picks || [];
        renderList();
      }

      el("new").onclick = () => fillForm(null);

      el("save").onclick = async () => {
        const payload = {
          title: el("w_title").value.trim() || DEFAULT_TITLE.ru,
          subtitle: el("w_subtitle").value.trim() || "",
          title_ro: el("w_title_ro").value.trim(),
          title_ru: el("w_title_ru").value.trim(),
          title_en: el("w_title_en").value.trim(),
          subtitle_ro: el("w_subtitle_ro").value.trim(),
          subtitle_ru: el("w_subtitle_ru").value.trim(),
          subtitle_en: el("w_subtitle_en").value.trim(),
          weekStart: el("w_start").value,
          weekEnd: el("w_end").value,
          productIds: selectedIds(),
          isActive: el("w_active").checked,
        };

        const url = currentId ? `/api/week-picks/${currentId}` : `/api/week-picks`;
        const method = currentId ? "PUT" : "POST";

        const saved = await api(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        await loadAll();
        const found = picks.find((x) => x.id === saved.id);
        fillForm(found || picks[0] || null);
      };

      await loadAll();
      fillForm(picks[0] || null);
    </script>
  </body>
</html>

<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Warm Knit — Product</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<header class="header">
  <div class="container">
    <div class="nav">
      <a class="brand" href="index.html">
        <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M14 38c9-18 27-24 36-12 9 12-2 33-20 30-13-2-20-9-16-18Z" fill="rgba(233,182,199,.9)"/>
          <path d="M22 40c5-12 17-16 22-8 5 8-2 22-13 20-8-2-12-6-9-12Z" fill="rgba(184,169,201,.55)"/>
          <path d="M12 22c8 0 16-7 20-12 6 7 14 12 20 12" stroke="rgba(45,36,33,.55)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="title">
          <strong>Warm Knit</strong>
          <span data-i18n="product_page">product page</span>
        </div>
      </a>

      <nav class="links">
        <a href="shop.html" class="active" data-i18n="nav_catalog">Catalog</a>
        <a href="about.html" data-i18n="nav_about">Despre brand</a>
        <a href="contact.html" data-i18n="nav_contact">Contacte</a>
      </nav>

      <div class="actions">
        <select id="langSelect" class="select">
          <option value="ro">RO</option>
          <option value="ru">RU</option>
          <option value="en">EN</option>
        </select>

        <button class="icon-btn burger" id="burgerBtn" aria-label="menu">
          <svg class="icon" viewBox="0 0 24 24" fill="none">
            <path d="M5 7h14M5 12h14M5 17h14" stroke="rgba(45,36,33,.8)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="icon-btn badge" id="cartBtn" aria-label="cart">
          <svg class="icon" viewBox="0 0 24 24" fill="none">
            <path d="M7 7h14l-2 10H8L6 3H3" stroke="rgba(45,36,33,.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm9 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="rgba(45,36,33,.75)"/>
          </svg>
          <span id="cartBadge">0</span>
        </button>
      </div>
    </div>

    <div id="mobileLinks" class="card mobile-links">
      <div class="mobile-links-row">
        <a class="btn small" href="shop.html" data-i18n="nav_catalog">Catalog</a>
        <a class="btn small" href="about.html" data-i18n="nav_about">Despre brand</a>
        <a class="btn small" href="contact.html" data-i18n="nav_contact">Contacte</a>
      </div>
    </div>
  </div>
</header>

<main class="container" id="productRoot">
  <section class="section">
    <div class="split">
      <div class="gallery reveal">
        <div class="main" aria-hidden="true"></div>
        <div class="strip" aria-hidden="true">
          <div class="ph"></div><div class="ph"></div><div class="ph"></div>
        </div>
      </div>

      <div class="card pad reveal">
        <div class="kicker" id="pTag">Handmade</div>
        <h1 class="h2" id="pName">—</h1>

        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
          <div style="font-family:var(--serif);font-size:26px" id="pPrice">0 MDL</div>
          <div class="pill" title="chosen"><span class="dot"></span><span id="pChosen" style="font-size:13px;color:rgba(45,36,33,.78)"></span></div>
        </div>

        <p class="p" id="pDesc" style="margin-top:14px"></p>

        <div class="form-row" style="margin-top:14px">
          <div class="field">
            <label data-i18n="size">Size</label>
            <select class="select" id="pSize">
              <option>One size</option>
              <option>XS/S</option>
              <option>M/L</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="color">Color</label>
            <select class="select" id="pColor">
              <option>Pudra</option>
              <option>Milk</option>
              <option>Caramel</option>
              <option>Lavender</option>
            </select>
          </div>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
          <button class="btn primary" id="pAdd" type="button" data-i18n="add_to_cart">Add to cart</button>
          <button class="btn" id="pBuyNow" type="button" data-i18n="buy_now">Buy now</button>
        </div>

        <hr class="sep"/>
        <div class="split">
          <div>
            <div class="kicker" data-i18n="category">Category</div>
            <div style="margin-top:6px;font-size:14px;color:rgba(45,36,33,.78)" id="pCat"></div>
          </div>
          <div>
            <div class="kicker" data-i18n="care_short">Care</div>
            <div style="margin-top:6px;font-size:14px;color:rgba(45,36,33,.78)" id="pCare"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="card pad reveal">
      <div class="toolbar">
        <div>
          <div class="kicker" data-i18n="recs">Recommendations</div>
          <h2 class="h2" style="margin-top:8px" data-i18n="pairs">Pairs perfectly</h2>
        </div>
        <a class="btn small" href="shop.html" data-i18n="nav_catalog">Catalog →</a>
      </div>
      <div class="products" id="recommendGrid" style="margin-top:16px"></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <div class="row">
      <div class="small">Warm Knit • <span data-i18n="product_page">product page</span> • demo</div>
      <div class="small"><a href="contact.html" data-i18n="ask_question">Ask a question</a></div>
    </div>
  </div>
</footer>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<aside class="drawer">
  <div class="head">
    <h4 data-i18n="cart">Coș</h4>
    <button class="icon-btn" id="cartClose" aria-label="close cart">
      <svg class="icon" viewBox="0 0 24 24" fill="none">
        <path d="M6 6l12 12M18 6L6 18" stroke="rgba(45,36,33,.8)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="content">
    <div id="cartEmpty" class="card pad" style="display:none">
      <div class="kicker" data-i18n="empty_kicker">Gol</div>
      <p class="p" style="margin:10px 0 0" data-i18n="empty_text"></p>
    </div>
    <div id="cartList"></div>
  </div>
  <div class="foot">
    <div class="total">
      <span data-i18n="total">Total</span>
      <b id="cartTotal">0 MDL</b>
    </div>
    <button class="btn primary" id="checkoutBtn" type="button" style="width:100%" data-i18n="checkout">Finalizează (demo)</button>
  </div>
</aside>

<div class="toast" id="toast">—</div>

<script src="/js/app.js"></script>
</body>
</html>
